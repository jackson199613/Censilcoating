name: Stamp last-updated dates

on:
  push:
    branches: [main]
    paths:
      - '**.html'
      - 'stamp-dates.py'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: stamp-dates
  cancel-in-progress: false

jobs:
  stamp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Stamp dates from git history
        run: python stamp-dates.py

      - name: Commit changes
        run: |
          if [ -z "$(git status --porcelain '*.html')" ]; then
            echo "No date changes"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A '*.html'
          git commit -m "chore: stamp last-updated dates"
          git push
