name: Auto-update sitemap.xml

on:
  push:
    branches: [main]
    paths:
      - '**.html'
      - 'generate-sitemap.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sitemap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate sitemap.xml
        run: python generate-sitemap.py

      - name: Commit changes
        run: |
          if [ -z "$(git status --porcelain sitemap.xml)" ]; then
            echo "No change to sitemap.xml"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git commit -m "chore: auto-update sitemap.xml"
          git push
